id: session-record-closeout
version: 0.1.0
status: active_contract
purpose: >
  Record material Willind work, decisions, validation, changed files, and
  follow-up risks into the daily chat-log/history without duplicating existing
  records.
when_to_use:
  - after_material_code_or_registry_change
  - after_skill_or_provider_bootstrap_change
  - after_operation_plan_or_blueprint_change
  - before_session_closeout
  - when_user_asks_whether_chatlog_history_was_recorded
when_not_to_use:
  - tiny_chat_reply_without_state_change
  - duplicate_of_existing_daily_record
  - private_secret_or_raw_export_content
input_contract:
  required:
    - work_summary
    - changed_files_or_no_change_reason
    - validation_result
  optional:
    - source_docs
    - followups
    - risks
    - user_visible_next_step
output_contract:
  required:
    - chat_log_entry_or_duplicate_reason
    - history_entry_or_duplicate_reason
    - paths_updated
  optional:
    - registry_index_update
    - unresolved_recording_gap
hook_timing:
  - post_tool
  - post_execution
  - memory_update
  - shutdown_archive
permission_tier:
  default: T1_trace_safe
  auto_allowed:
    - local_markdown_append
    - local_history_append
    - duplicate_check
  requires_confirmation:
    - rewriting_existing_history
    - deleting_or_redacting_history
  blocked_without_explicit_approval:
    - secret_dump
    - private_raw_export_copy
    - external_send
provider_preferences:
  primary: codex_cli
  reviewers:
    - claude_cli
  fallback:
    - local_llm
  notes: Any provider may call the helper, but Codex is preferred for local file append and validation.
storage_policy:
  chat_log: docs/chat-log/YYYY-MM-DD.md
  history: docs/history/YYYY-MM-DD.md
  runtime_notes: runtime/logs
tests_or_validation:
  - check_daily_files_exist_or_create_them
  - avoid_duplicate_section_title
  - do_not_include_secret_values
  - report_record_paths_after_append
