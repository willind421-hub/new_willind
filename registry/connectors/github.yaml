contract: willind.connector.github
version: 0.1.0
updated: 2026-06-14

connector:
  id: github
  display_name: GitHub
  kind: code_host_connector
  priority: P1
  status: planned_disabled
  owner_scope: code_review_release

read:
  status: planned_disabled
  permission_required: allow
  notes: Public repo, issue, PR, and status inspection may be added later.
draft:
  status: planned_disabled
  permission_required: allow
  notes: Issue, PR, release note, and review drafts are safe locally.
write:
  status: planned_disabled
  permission_required: confirm
  notes: Issue, PR, branch, release, or comment creation is external state.
send:
  status: planned_disabled
  permission_required: confirm
  notes: PR creation, comments, releases, and git remote writes need preflight.
delete:
  status: planned_disabled
  permission_required: confirm_or_block
  notes: Branch, issue, release, or package deletion is gated.
payment:
  status: blocked
  permission_required: blocked
  notes: Billing, marketplace, and plan changes are not in this connector.

secret_env_names:
  - GITHUB_TOKEN
  - GH_TOKEN
  - GITHUB_APP_ID
  - GITHUB_APP_PRIVATE_KEY_PATH

permission_required:
  read: allow
  draft: allow
  write: confirm
  send: confirm
  delete: confirm_or_block
  payment: blocked
