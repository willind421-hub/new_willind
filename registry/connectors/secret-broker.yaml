contract: willind.connector.secret_broker
version: 0.1.0
updated: 2026-06-14

connector:
  id: secret-broker
  display_name: Connector Secret Broker
  kind: secret_policy
  priority: P0
  status: planned_disabled
  owner_scope: registry_connector_spine

purpose: >
  Provide the future common place for connector authentication state. This
  contract records secret key names and readiness only. It must not read,
  print, summarize, export, or transmit secret values.

approved_secret_locations:
  - C:/new_willind/.env
  - C:/new_willind/.secrets/

allowed_now:
  key_name_inventory: true
  configured_or_missing_status: true
  redacted_health_summary: true
  setup_plan_draft: true

blocked_now:
  read_secret_value: true
  print_secret_value: true
  copy_secret_to_clipboard: true
  send_secret_externally: true
  store_secret_outside_approved_locations: true
  create_or_rotate_remote_key_without_confirmation: true
  enable_billing_or_paid_plan: true

permission_required:
  discover_key_names: allow
  create_free_app_or_token: confirm
  store_token_in_env: confirm
  refresh_oauth_token: confirm
  smoke_call_free_quota: trace_required
  expand_oauth_scope: strong_confirm
  publish_external_app: strong_confirm
  delete_or_rotate_remote_key: strong_confirm
  read_secret_value: blocked
  print_or_send_secret_value: blocked

report_shape:
  - connector_id
  - secret_env_names
  - configured_state
  - approved_storage_target
  - scopes_requested
  - permission_decision
  - next_confirmation_needed

rules:
  secret_env_names_are_not_secret_values: true
  never_log_secret_material: true
  secret_policy_overrides_connector_policy: true
  registry_may_list_key_names_only: true

