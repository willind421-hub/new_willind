contract: willind.connector.preflight_enforcement
version: 0.1.0
updated: 2026-06-14

connector:
  id: preflight-enforcement
  display_name: Connector Preflight Enforcement
  kind: external_send_policy
  priority: P0
  status: active_available
  owner_scope: registry_connector_spine

purpose: >
  Require a local inspection step before any connector sends, publishes,
  uploads, comments, opens a PR, calls a webhook, or otherwise exports data
  outside local Willind.

policy_source:
  permission_gate: registry/permissions/permission-gate-policy.yaml
  external_send_service: registry/services/external-send-preflight.yaml
  action_runtime: "<your-backend>"

preflight_required_for:
  - email_send
  - chat_message_send
  - sns_publish
  - webhook_call
  - google_drive_upload
  - google_calendar_write
  - github_pr_or_issue_create
  - git_remote_write
  - youtube_upload_or_schedule
  - affiliate_link_publish
  - ad_campaign_submit
  - payment_or_order_submit

preflight_must_not:
  - send_email
  - publish_post
  - call_webhook
  - push_git
  - upload_file
  - submit_payment
  - read_attachment_content
  - print_secret_value

permission_required:
  public_generated_low_risk_send: trace_required
  unknown_sensitivity_send: confirm
  private_or_personal_send: strong_confirm_or_block
  secret_or_credential_send: blocked
  payment_or_money_movement: strong_confirm
  account_or_security_change: strong_confirm_or_block

audit_required:
  - audit_id
  - connector_id
  - operation
  - decision
  - sensitivity
  - redacted_preview
  - target_metadata
  - permission_gate.runtime_status

rules:
  external_send_without_preflight_blocked: true
  preflight_is_inspection_not_sender: true
  attachment_content_boundary_metadata_only: true
  secret_value_read: false
