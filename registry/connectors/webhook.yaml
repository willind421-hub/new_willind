contract: willind.connector.webhook
version: 0.1.0
updated: 2026-06-14

connector:
  id: webhook
  display_name: Generic Webhook
  kind: outbound_http_connector
  priority: P2
  status: planned_disabled
  owner_scope: integration_bridge

read:
  status: planned_disabled
  permission_required: allow
  notes: Public docs, endpoint shape, and health checks may be inspected.
draft:
  status: planned_disabled
  permission_required: allow
  notes: Payload drafts and request previews are local-only.
write:
  status: planned_disabled
  permission_required: confirm
  notes: Registering a receiver or changing webhook config is gated.
send:
  status: planned_disabled
  permission_required: confirm
  notes: Any outbound POST requires preflight.
delete:
  status: planned_disabled
  permission_required: confirm_or_block
  notes: Removing webhook config or remote records is gated.
payment:
  status: blocked
  permission_required: blocked
  notes: Paid webhook providers or billing changes are outside this connector.

secret_env_names:
  - WEBHOOK_URL
  - WEBHOOK_SECRET
  - WEBHOOK_SIGNING_SECRET

permission_required:
  read: allow
  draft: allow
  write: confirm
  send: confirm
  delete: confirm_or_block
  payment: blocked
